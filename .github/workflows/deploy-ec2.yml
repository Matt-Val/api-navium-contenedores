name: Despliegue a EC2 y Docker Hub

on:
  push:
    branches:
      - deploy 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-contenedores:latest

      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,DB_URL,DB_USERNAME,DB_PASSWORD 
          script: |
            if [ ! -d "api-navium-contenedores" ]; then
              git clone https://github.com/matt-val/api-navium-contenedores.git
            fi
            
            cd api-navium-contenedores
            git checkout deploy
            git pull origin deploy
            
            echo "DOCKER_USERNAME=$DOCKER_USERNAME" > .env
            echo "DB_URL=$DB_URL" >> .env
            echo "DB_USERNAME=$DB_USERNAME" >> .env
            echo "DB_PASSWORD=$DB_PASSWORD" >> .env
            
            sudo docker compose down
            sudo docker compose pull
            sudo docker compose up -d